name: Java CI

on:
  push:
    branches: [ develop, QA ]
  pull_request:
    branches: [ develop, QA ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 22
        uses: actions/setup-java@v3
        with:
          java-version: '22'
          distribution: 'temurin'
          cache: maven

      - name: Build and run tests
        run: mvn clean test